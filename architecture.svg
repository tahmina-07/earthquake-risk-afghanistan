<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Earthquake Risk Assessment System — Afghanistan</text>

  <!-- ─── INPUT LAYER ─── -->
  <text x="150" y="72" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">DATA SOURCES</text>

  <!-- Satellite box -->
  <rect x="30" y="85" width="150" height="68" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="105" y="108" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">🛰 Satellite Data</text>
  <text x="105" y="124" text-anchor="middle" fill="#8b949e" font-size="10">NASA SRTM Elevation</text>
  <text x="105" y="139" text-anchor="middle" fill="#8b949e" font-size="10">Sentinel-1 InSAR</text>

  <!-- USGS box -->
  <rect x="30" y="170" width="150" height="68" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="105" y="193" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">📡 USGS Catalog</text>
  <text x="105" y="209" text-anchor="middle" fill="#8b949e" font-size="10">8,250+ Earthquakes</text>
  <text x="105" y="224" text-anchor="middle" fill="#8b949e" font-size="10">Mag, Depth, Location</text>

  <!-- Sensor box -->
  <rect x="30" y="255" width="150" height="68" rx="8" fill="#161b22" stroke="#db6d28" stroke-width="1.5"/>
  <text x="105" y="278" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">⚙️ Ground Sensor</text>
  <text x="105" y="294" text-anchor="middle" fill="#8b949e" font-size="10">Raspberry Pi Node</text>
  <text x="105" y="309" text-anchor="middle" fill="#8b949e" font-size="10">ROS2 Simulation</text>

  <!-- Arrows input → pipeline -->
  <line x1="180" y1="119" x2="270" y2="190" stroke="#238636" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="180" y1="204" x2="270" y2="210" stroke="#1f6feb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="180" y1="289" x2="270" y2="230" stroke="#db6d28" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- ─── PIPELINE LAYER ─── -->
  <text x="370" y="72" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">DATA PIPELINE</text>

  <rect x="270" y="155" width="200" height="100" rx="8" fill="#161b22" stroke="#6e40c9" stroke-width="1.5"/>
  <text x="370" y="182" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">🔧 ETL Pipeline</text>
  <text x="370" y="200" text-anchor="middle" fill="#8b949e" font-size="10">Data Cleaning</text>
  <text x="370" y="216" text-anchor="middle" fill="#8b949e" font-size="10">Feature Engineering</text>
  <text x="370" y="232" text-anchor="middle" fill="#8b949e" font-size="10">Pandas · GeoPandas</text>

  <!-- Arrow pipeline → ML -->
  <line x1="470" y1="205" x2="540" y2="205" stroke="#6e40c9" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ─── ML LAYER ─── -->
  <text x="630" y="72" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">AI / ML ENGINE</text>

  <rect x="540" y="155" width="180" height="100" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="630" y="182" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="bold">🤖 ML Risk Model</text>
  <text x="630" y="200" text-anchor="middle" fill="#8b949e" font-size="10">Random Forest · XGBoost</text>
  <text x="630" y="216" text-anchor="middle" fill="#8b949e" font-size="10">Anomaly Detection</text>
  <text x="630" y="232" text-anchor="middle" fill="#8b949e" font-size="10">Risk Scoring (H/M/L)</text>

  <!-- Arrow ML → outputs -->
  <line x1="720" y1="185" x2="790" y2="155" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arrowYellow)"/>
  <line x1="720" y1="225" x2="790" y2="255" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arrowYellow)"/>

  <!-- ─── OUTPUT LAYER ─── -->
  <text x="840" y="72" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">OUTPUTS</text>

  <!-- Alert box -->
  <rect x="790" y="100" width="80" height="68" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="830" y="126" text-anchor="middle" fill="#f85149" font-size="18">🚨</text>
  <text x="830" y="146" text-anchor="middle" fill="#f85149" font-size="10" font-weight="bold">Alert</text>
  <text x="830" y="160" text-anchor="middle" fill="#8b949e" font-size="9">Early Warning</text>

  <!-- Map box -->
  <rect x="790" y="220" width="80" height="68" rx="8" fill="#161b22" stroke="#39d353" stroke-width="1.5"/>
  <text x="830" y="246" text-anchor="middle" fill="#39d353" font-size="18">🗺</text>
  <text x="830" y="266" text-anchor="middle" fill="#39d353" font-size="10" font-weight="bold">Risk Map</text>
  <text x="830" y="280" text-anchor="middle" fill="#8b949e" font-size="9">Streamlit Dashboard</text>

  <!-- ─── ARROW MARKERS ─── -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#238636"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1f6feb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#db6d28"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6e40c9"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- ─── TECH STACK FOOTER ─── -->
  <rect x="30" y="355" width="840" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="373" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold" letter-spacing="1">TECH STACK</text>
  <text x="450" y="392" text-anchor="middle" fill="#6e7681" font-size="10">Python · Pandas · GeoPandas · Scikit-learn · XGBoost · Folium · Streamlit · ROS2 · Raspberry Pi · USGS API · NASA SRTM · Sentinel-1</text>

</svg>
